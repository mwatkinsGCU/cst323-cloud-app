# =============================================================
# CST-323 Cloud Test Application - Application Properties
# Update the datasource settings for each cloud platform.
# =============================================================

# --- DataSource (MySQL) ---
spring.datasource.url=jdbc:mysql://localhost:3306/cst323db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# --- Thymeleaf ---
spring.thymeleaf.cache=false

# --- Server ---
server.port=8080

# --- Logging (SLF4J backed by Logback) ---
logging.level.com.gcu.cst323=INFO
logging.level.org.springframework=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n
logging.file.name=logs/cst323.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n
