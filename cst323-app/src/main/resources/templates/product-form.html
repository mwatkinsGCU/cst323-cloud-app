<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${formTitle + ' - CST-323'}">Product Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">
            <i class="bi bi-box-seam me-2"></i>CST-323 Inventory
        </a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="/products">Products</a></li>
                <li class="nav-item"><a class="nav-link" href="/categories">Categories</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">

            <div class="card border-0 shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">
                        <i class="bi bi-box-seam me-2"></i>
                        <span th:text="${formTitle}">Product Form</span>
                    </h5>
                </div>
                <div class="card-body">

                    <!-- CREATE form -->
                    <form th:if="${product.id == null}"
                          th:action="@{/products}" th:object="${product}" method="post" novalidate>

                        <div class="mb-3">
                            <label for="name" class="form-label fw-semibold">Product Name <span class="text-danger">*</span></label>
                            <input type="text" id="name" th:field="*{name}" class="form-control"
                                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'" placeholder="e.g. Wireless Keyboard">
                            <div class="invalid-feedback" th:errors="*{name}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="category" class="form-label fw-semibold">Category <span class="text-danger">*</span></label>
                            <select id="category" th:field="*{category}" class="form-select"
                                    th:classappend="${#fields.hasErrors('category')} ? 'is-invalid'">
                                <option value="">-- Select Category --</option>
                                <option th:each="cat : ${categories}"
                                        th:value="${cat.id}"
                                        th:text="${cat.name}"></option>
                            </select>
                            <div class="invalid-feedback" th:errors="*{category}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="description" class="form-label fw-semibold">Description</label>
                            <textarea id="description" th:field="*{description}" class="form-control" rows="3"
                                      placeholder="Optional description"></textarea>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-6">
                                <label for="quantity" class="form-label fw-semibold">Quantity <span class="text-danger">*</span></label>
                                <input type="number" id="quantity" th:field="*{quantity}" class="form-control"
                                       th:classappend="${#fields.hasErrors('quantity')} ? 'is-invalid'" min="0">
                                <div class="invalid-feedback" th:errors="*{quantity}"></div>
                            </div>
                            <div class="col-6">
                                <label for="price" class="form-label fw-semibold">Price ($) <span class="text-danger">*</span></label>
                                <input type="number" id="price" th:field="*{price}" class="form-control"
                                       th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'" step="0.01" min="0.01">
                                <div class="invalid-feedback" th:errors="*{price}"></div>
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-success">
                                <i class="bi bi-check-circle me-1"></i>Save Product
                            </button>
                            <a href="/products" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>

                    <!-- EDIT form -->
                    <form th:if="${product.id != null}"
                          th:action="@{/products/update/{id}(id=${product.id})}" th:object="${product}" method="post" novalidate>

                        <div class="mb-3">
                            <label for="nameEdit" class="form-label fw-semibold">Product Name <span class="text-danger">*</span></label>
                            <input type="text" id="nameEdit" th:field="*{name}" class="form-control"
                                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:errors="*{name}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="categoryEdit" class="form-label fw-semibold">Category <span class="text-danger">*</span></label>
                            <select id="categoryEdit" th:field="*{category}" class="form-select"
                                    th:classappend="${#fields.hasErrors('category')} ? 'is-invalid'">
                                <option value="">-- Select Category --</option>
                                <option th:each="cat : ${categories}"
                                        th:value="${cat.id}"
                                        th:text="${cat.name}"
                                        th:selected="${product.category != null and cat.id == product.category.id}"></option>
                            </select>
                            <div class="invalid-feedback" th:errors="*{category}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="descEdit" class="form-label fw-semibold">Description</label>
                            <textarea id="descEdit" th:field="*{description}" class="form-control" rows="3"></textarea>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-6">
                                <label for="qtyEdit" class="form-label fw-semibold">Quantity <span class="text-danger">*</span></label>
                                <input type="number" id="qtyEdit" th:field="*{quantity}" class="form-control"
                                       th:classappend="${#fields.hasErrors('quantity')} ? 'is-invalid'" min="0">
                                <div class="invalid-feedback" th:errors="*{quantity}"></div>
                            </div>
                            <div class="col-6">
                                <label for="priceEdit" class="form-label fw-semibold">Price ($) <span class="text-danger">*</span></label>
                                <input type="number" id="priceEdit" th:field="*{price}" class="form-control"
                                       th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'" step="0.01" min="0.01">
                                <div class="invalid-feedback" th:errors="*{price}"></div>
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle me-1"></i>Update Product
                            </button>
                            <a href="/products" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
